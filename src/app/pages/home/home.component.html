<div class="container">
    <div class="header">
        <h1>Employee Management System</h1>

    </div>

    <div class="form-container">
        <h2>{{empId?'Update Employee':'Add employee'}}</h2>
        <form [formGroup]="employeeForm">
            <input type="text" placeholder="Employee ID" formControlName="id" name="id">
            <input type="text" placeholder="Employee Name" formControlName="name" name="name">
            <input type="text" placeholder="Employee Email" formControlName="email" name="email">
            <input type="text" placeholder="Employee Phone" formControlName="phone" name="phone">
            <input type="text" placeholder="Employee Department" formControlName="department" name="department">
            <input type="text" placeholder="Employee Designation" formControlName="designation" name="designation">
            <input type="text" placeholder="Employee Salary" formControlName="salary" name="salary">
            <input type="text" placeholder="Employee Location" formControlName="location" name="location">
            <button class="btn-add" type="button" (click)="saveEmpDetails()">{{empId?'Update':'Add'}}</button>



        </form>
    </div>
    <div class="card">
        <h2>Employee List</h2>

        <button id="import" (click)="fileInput.click()">Import File</button>

        <input #fileInput type="file" hidden accept=".xlsx,.xls" (change)="onFileSelected($event)">

        <kendo-textbox (input)="search($event)" placeholder="Search by name"></kendo-textbox>



        <!-- kendo grid -->
        <kendo-grid #grid [sortable]="true" [pageable]="true" filterable="menu" [pageSize]="pageSize" [skip]="skip"
            (pageChange)="pageChange($event)" [data]="gridData()" [height]="700">
            <ng-template kendoGridToolbarTemplate>
                <button id="excelExp" type="button" kendoGridExcelCommand>
                    Export to Excel
                </button>
                <button id="pdfExp" type="button" kendoButton (click)="exportPDF()">
                    Export to PDF
                </button>
            </ng-template>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" [filterable]="false" field="id"
                title="Employee ID" [width]="80"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" [filterable]="false" field="name"
                title="Name" [width]="100"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" [filterable]="false" field="email"
                title="Email" [width]="150"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" field="department"
                filterVariant="multiCheckbox" title="Department" [width]="100"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" field="designation"
                filterVariant="multiCheckbox" title="Designation" [width]="100"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" filterVariant="multiCheckbox"
                filter="numeric" field="salary" title="Salary" [width]="100"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" field="location" title="Location"
                filterVariant="multiCheckbox" [width]="100"></kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" field="status" title="Status"
                filterVariant="multiCheckbox" [width]="100">
                <ng-template kendoGridCellTemplate let-dataItem>
                    <span class="whole-cell" [style.backgroundColor]="statusColor(dataItem.status)">
                        {{ dataItem.status }}
                    </span>
                </ng-template>
            </kendo-grid-column>
            <kendo-grid-column [headerStyle]="{ 'background-color': '#555' }" title="Action" [width]="140">
                <ng-template kendoGridCellTemplate let-dataItem>
                    <button kendoButton id="update" (click)="getEmpDetails(dataItem.id)">Update</button>
                    <button kendoButton id="delete" (click)="removeEmp(dataItem.id)">Delete</button>
                </ng-template>
            </kendo-grid-column>
            <kendo-grid-excel fileName="Employees.xlsx" [fetchData]="allData"></kendo-grid-excel>
            <kendo-grid-pdf fileName="Employees.pdf" [delay]="1000" [allPages]="true" paperSize="A4" [landscape]="true">
            </kendo-grid-pdf>
        </kendo-grid>
    </div>


  <app-edit-grid></app-edit-grid>

    

</div>
